async function sendTeamsNotification(destinatari, tasca, exp) {
  const body = {
    type: "message",
    attachments: [{
      contentType: "application/vnd.microsoft.card.adaptive",
      content: {
        "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
        type: "AdaptiveCard",
        version: "1.4",
        body: [
          {
            type: "TextBlock",
            text: `📋 Nova tasca per a **${destinatari}**`,
            weight: "Bolder",
            size: "Medium",
            wrap: true
          },
          {
            type: "FactSet",
            facts: [
              { title: "Expedient:", value: `${exp.codi} – ${exp.nom}` },
              { title: "Tasca:", value: tasca.nom }
            ]
          }
        ]
      }
    }]
  };
  try {
    const res = await fetch(TEAMS_WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (res.ok) toast("Avís enviat a Teams ✓");
    else console.warn("Error Teams:", res.status, await res.text());
  } catch(e) {
    console.warn("Error enviant a Teams:", e);
  }
}

let expedients = [];
let currentId = null;
let currentView = "home";
let db = null; // Firestore instance, s'inicialitza a initFirebase()

const RESP_CLASS = {
  "Imma": "r-imma",
  "Abde": "r-abde",
  "Àrea promotora": "r-area",
  "Ester": "r-ester"
};

// save() escriu l'expedient actual a Firestore
async function save() {
  if (!db) return;
  const { doc, setDoc, deleteDoc, collection } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  for (const exp of expedients) {
    await setDoc(doc(db, "expedients_v8", exp.id), exp);
  }
}

// saveOne() escriu un sol expedient (més eficient)
async function saveOne(exp) {
  if (!db) return;
  const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await setDoc(doc(db, "expedients_v8", exp.id), exp);
}

// deleteOne() elimina un expedient de Firestore
async function deleteOne(id) {
  if (!db) return;
  const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await deleteDoc(doc(db, "expedients_v8", id));
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

function escHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escAttr(s) {
  return String(s || "").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// ── Dashboard inici ──────────────────────────────────────────────────────────
function renderHome() {
  if (!expedients.length) {
    return `<div style="padding:30px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:18px">Inici</h2>
        <button onclick="openNewExp()" style="padding:8px 16px;background:#1D9E75;color:white;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500">+ Nou expedient</button>
      </div>
      <p style="color:#bbb;font-size:13px">Cap expedient encara. Crea el primer!</p>
    </div>`;
  }

  // Agrupar per tipus
  const ORDRE = ["Licitació","SDA Material","SDA Formació","Pròrroga","Modificació"];
  const grups = {};
  ORDRE.forEach(t => grups[t] = []);
  expedients.forEach(e => {
    if (grups[e.tipus] !== undefined) grups[e.tipus].push(e);
    else grups["Altres"] = (grups["Altres"] || []).concat(e);
  });

  const RESP_COL = { "Imma":"r-imma", "Abde":"r-abde", "Ester":"r-ester", "Àrea promotora":"r-area" };

  function cardHTML(e) {
    const total = e.tasques.filter(t => t.nom).length;
    const fetes = e.tasques.filter(t => t.nom && t.feta).length;
    const pct = total ? Math.round(fetes / total * 100) : 0;
    const isDone = pct === 100;

    // Responsable actual: primera tasca pendent
    const seguent = e.tasques.find(t => t.nom && !t.feta);
    const respActual = seguent ? seguent.resp : "✓ Completat";
    const respClass = seguent ? (RESP_COL[seguent.resp] || "") : "b-green";

    return `<div class="dash-card" onclick="selectExp('${e.id}')">
      <div class="dash-card-info">
        <div class="dash-card-nom">${escHtml(e.nom)}</div>
        <div class="dash-card-meta">${escHtml(e.codi)} · ${escHtml(e.area)}</div>
        <div class="dash-card-progress">
          <div class="dash-progress-bar">
            <div class="dash-progress-fill${isDone?' done':''}" style="width:${pct}%"></div>
          </div>
          <div class="dash-pct">${fetes} de ${total} tasques completades (${pct}%)</div>
        </div>
      </div>
      <div class="dash-resp">
        <span class="resp-pill ${respClass}" style="font-size:10px">${escHtml(respActual)}</span>
      </div>
    </div>`;
  }

  let html = `<div style="padding:22px 26px;overflow-y:auto;height:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:17px;font-weight:700">Resum d'expedients</h2>
      <button onclick="openNewExp()" style="padding:7px 15px;background:#1D9E75;color:white;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500">+ Nou expedient</button>
    </div>`;

  ORDRE.forEach(tipus => {
    const llista = grups[tipus];
    if (!llista || !llista.length) return;
    html += `<div class="dash-section">
      <div class="dash-section-title">${escHtml(tipus)} <span style="font-weight:400;color:#ccc">(${llista.length})</span></div>
      ${llista.map(e => cardHTML(e)).join("")}
    </div>`;
  });

  if (grups["Altres"] && grups["Altres"].length) {
    html += `<div class="dash-section">
      <div class="dash-section-title">Altres</div>
      ${grups["Altres"].map(e => cardHTML(e)).join("")}
    </div>`;
  }

  html += `</div>`;
  return html;
}

// ── Navegació ─────────────────────────────────────────────────────────────────
function goHome() {
  currentView = "home"; currentId = null;
  renderSidebar(); renderMain();
}
function selectExp(id) {
  currentView = "exp"; currentId = id;
  renderSidebar(); renderMain();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById("expList");
  el.innerHTML = expedients.map(e => `
    <div class="exp-item${e.id === currentId ? ' active' : ''}" onclick="selectExp('${e.id}')">
      <div class="exp-code">${escHtml(e.codi)}</div>
      <div class="exp-name">${escHtml(e.nom)}</div>
    </div>`).join("") || '<div style="padding:20px;color:#bbb;font-size:12px">Cap expedient encara</div>';
}

// ── Main ──────────────────────────────────────────────────────────────────────
function renderMain() {
  const mc = document.getElementById("mainContent");
  if (currentView === "home") {
    mc.innerHTML = renderHome();
    return;
  }

  const exp = expedients.find(e => e.id === currentId);
  if (!exp) return;

  const proc = PROCEDIMENTS[exp.tipus];

  let html = `
  <div class="mhead">
    <div style="flex:1;min-width:0">
      <div>
        <span class="mtitle" id="nomDisplay" onclick="startEditNom('${exp.id}')" title="Clica per editar el nom">${escHtml(exp.nom)}</span>
      </div>
      <div class="mmeta">
        <span id="codiDisplay" onclick="startEditCodi('${exp.id}')" style="cursor:pointer;border-bottom:1px dashed #bbb;padding-bottom:1px" title="Clica per editar el codi">${escHtml(exp.codi)}</span>
        &nbsp;·&nbsp;${escHtml(exp.tipus)}
      </div>
    </div>
    <button class="btn btn-red" onclick="deleteExp('${exp.id}')">Eliminar</button>
  </div>
  <div class="mbody">`;

  // Etiquetes d'estat NOMÉS per a Licitació
  if (proc && proc.esLicitacio) {
    const tags = [];
    if (exp.esObra) tags.push(`<span class="badge b-amber">Obra</span>`);
    if (exp.organ === "ce") tags.push(`<span class="badge b-blue">Comissió Executiva</span>`);
    if (exp.harmonitzat) tags.push(`<span class="badge b-green">Harmonitzat</span>`);
    if (tags.length) html += `<div style="display:flex;gap:8px;flex-wrap:wrap">${tags.join("")}</div>`;
  }

  exp.tasques.forEach((t, i) => {
    if (!t.nom) {
      html += `<div class="fase-header">${escHtml(t.fase)}</div>`;
      return;
    }

    const nomComplet = t.nom;
    // Versió curta: primera línia o primers MAX_CHARS caràcters
    const primeraLinia = nomComplet.split("\n")[0];
    const teTallat = nomComplet.length > MAX_CHARS || nomComplet.includes("\n");
    const nomCurt = teTallat
      ? (primeraLinia.length > MAX_CHARS ? primeraLinia.substring(0, MAX_CHARS) + "…" : primeraLinia + "…")
      : nomComplet;

    const nomHtml = teTallat
      ? `${escHtml(nomCurt)}<button class="task-expand-btn" onclick="showTaskDetail('${exp.id}',${i})">veure tot</button>`
      : escHtml(nomComplet);

    html += `
    <div class="task ${t.feta ? 'done' : ''}">
      <div class="chk ${t.feta ? 'checked' : ''}" onclick="toggleTask('${exp.id}', ${i})">${t.feta ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-name ${t.feta ? 'done-text' : ''}">${nomHtml}</div>
        <div class="task-tags">
          <span class="resp-pill ${RESP_CLASS[t.resp] || ''}">${escHtml(t.resp)}</span>
          <button class="mail-btn" onclick="showMail('${exp.id}', ${i})" title="Enviar correu">✉</button>
        </div>
      </div>
    </div>`;
  });

  mc.innerHTML = html + `</div>`;
}

// ── Modal detall de tasca ─────────────────────────────────────────────────────
function showTaskDetail(expId, idx) {
  const exp = expedients.find(e => e.id === expId);
  if (!exp) return;
  const t = exp.tasques[idx];

  document.getElementById("modalArea").innerHTML = `
    <div class="modal-bg" onclick="this.remove()">
      <div class="task-detail-modal" onclick="event.stopPropagation()">
        <div class="modal-title">Detall de la tasca</div>
        <div class="task-detail-body">${escHtml(t.nom)}</div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn" onclick="this.closest('.modal-bg').remove()">Tancar</button>
          <button class="btn btn-g" onclick="completeFromDetail('${expId}',${idx})">✓ Completar tasca</button>
        </div>
      </div>
    </div>`;
}

async function completeFromDetail(expId, idx) {
  const exp = expedients.find(e => e.id === expId);
  if (!exp) return;
  const t = exp.tasques[idx];
  if (!t.feta) {
    t.feta = true;
    renderMain();
    await saveOne(exp);
    toast("Tasca completada!");
    triggerAutoMail(exp, idx);
  }
  document.querySelector(".modal-bg")?.remove();
}

// ── Correu automàtic per Ester i Imma ────────────────────────────────────────
// Quan es completa la tasca a l'índex `idxCompletada`, busca la SEGÜENT tasca
// pendent i, si és de l'Ester o la Imma, obre un correu avisant-les.
async function triggerAutoMail(exp, idxCompletada) {
  const completada = exp.tasques[idxCompletada];
  const seguent = exp.tasques.slice(idxCompletada + 1).find(t => t.nom && !t.feta);
  if (!seguent) return;

  // Només dispara si hi ha canvi de responsable
  if (!completada || completada.resp === seguent.resp) return;

  const MAILS = {
    "Ester": MAIL_ESTER,
    "Imma":  MAIL_IMMA,
    "Abde":  MAIL_ABDE
  };

  const destinatari = seguent.resp;
  const mail = MAILS[destinatari];

  // Envia sempre a Teams (automàtic, sense intervenció)
  await sendTeamsNotification(destinatari, seguent, exp);

  // A més, obre el correu de l'Outlook si hi ha adreça configurada
  if (mail) {
    const subj = `[${exp.codi}] Nova tasca pendent – ${exp.nom}`;
    const body = `Hola ${destinatari},\n\nS'ha completat la tasca anterior a l'expedient ${exp.codi} – ${exp.nom}.\n\nEt correspon la següent tasca:\n"${seguent.nom}"\n\nGràcies!`;
    window.location.href = `mailto:${mail}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  }
}

// ── Toggle tasca ──────────────────────────────────────────────────────────────
async function toggleTask(expId, idx) {
  const exp = expedients.find(e => e.id === expId);
  if (!exp) return;
  const tasca = exp.tasques[idx];
  const eraFeta = tasca.feta;
  tasca.feta = !tasca.feta;
  renderMain();
  await saveOne(exp);

  if (!eraFeta && tasca.feta) {
    triggerAutoMail(exp, idx);
  }
}

// ── Correu manual (botó ✉) ────────────────────────────────────────────────────
function showMail(expId, idx) {
  const exp = expedients.find(e => e.id === expId);
  if (!exp) return;
  const t = exp.tasques[idx];
  const nom = t.resp || "";
  const subj = `[${exp.codi}] Recordatori de tasca – ${exp.nom}`;
  const body = `Hola ${nom},\n\nQueda pendent la següent tasca a l'expedient ${exp.codi} – ${exp.nom}:\n"${t.nom}"\n\nGràcies!`;
  window.location.href = `mailto:${MAIL_GENERIC}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
}

function selectProc(el, value) {
  document.querySelectorAll('#procGroup .radio-opt').forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("nProcediment").value = value;
  const esLic = PROCEDIMENTS[value]?.esLicitacio;
  document.getElementById("extraOptions").style.display = esLic ? "block" : "none";
}

function selectOpt(el, hiddenId, value) {
  el.parentElement.querySelectorAll('.radio-opt').forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById(hiddenId).value = value;
}

async function createExp() {
  const nom = document.getElementById("nNom").value.trim();
  const codi = document.getElementById("nCodi").value.trim();
  const area = document.getElementById("nArea").value;
  const procKey = document.getElementById("nProcediment").value;
  const esObra = document.getElementById("nObra")?.value === "si";
  const organ = document.getElementById("nOrgan")?.value || "";
  const harmonitzat = document.getElementById("nHarm")?.value === "si";

  if (!nom || !codi || !procKey) {
    alert("Omple el nom, el codi i selecciona el tipus de procediment");
    return;
  }

  const proc = PROCEDIMENTS[procKey];
  let tasques = proc.tasques.map(t => ({ ...t, feta: false }));

  if (proc.esLicitacio) {
    tasques = tasques.filter(t => {
      if (!t.nom) return true;
      if (t.cond === "obra" && !esObra) return false;
      if (t.cond === "harmonitzat" && !harmonitzat) return false;
      if (t.cond === "ce" && organ !== "ce") return false;
      return true;
    });
  }

  const id = "exp_" + Date.now();
  expedients.unshift({
    id, codi, nom,
    area: area || "—",
    tipus: proc.nom,
    esObra, organ, harmonitzat,
    data: new Date().toLocaleDateString("ca-ES"),
    tasques
  });

  document.querySelector(".modal-bg").remove();
  currentId = id;
  renderSidebar();
  renderMain();
  toast("Expedient creat correctament!");
  await saveOne(expedients[0]);
}

async function deleteExp(id) {
  if (confirm("Eliminar aquest expedient?")) {
    expedients = expedients.filter(e => e.id !== id);
    goHome();
    await deleteOne(id);
  }
}

// ── Init Firebase i escolta temps real ───────────────────────────────────────
async function initFirebase() {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getFirestore, collection, onSnapshot, query, orderBy } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

  const firebaseConfig = {
    apiKey: "AIzaSyB0kGjdiM5v8OgIThqckGPIjx3iD4FMbFM",
    authDomain: "prova-v8-prbb.firebaseapp.com",
    projectId: "prova-v8-prbb",
    storageBucket: "prova-v8-prbb.firebasestorage.app",
    messagingSenderId: "962462273858",
    appId: "1:962462273858:web:c9833bfdf3f3fcffdb78db"
  };

  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);

  // Escolta canvis en temps real — actualitza automàticament quan qualsevol persona fa un canvi
  const q = query(collection(db, "expedients_v8"));
  onSnapshot(q, (snapshot) => {
    expedients = snapshot.docs.map(d => d.data());
    // Ordenar per data de creació (més recent primer)
    expedients.sort((a, b) => (b.data || "").localeCompare(a.data || ""));
    renderSidebar();
    if (currentView === "home") renderMain();
    else if (currentId) {
      const still = expedients.find(e => e.id === currentId);
      if (still) renderMain();
      else goHome();
    }
  });

  // Indicador de connexió
  toast("Connectat a Firebase ✓");
}

// ── Init ──────────────────────────────────────────────────────────────────────
goHome();
initFirebase();
